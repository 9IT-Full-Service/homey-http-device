<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" fill="none">
  <!-- Driver Icon: Virtual device panel with buttons, slight right-angle perspective -->
  <!-- Transparent background, single color (#000), 960x960 canvas -->

  <!-- Device body (angled panel - slight 3D perspective from right) -->
  <path d="
    M220 160
    L680 120
    Q720 118 730 155
    L750 760
    Q755 800 715 805
    L255 840
    Q215 843 210 805
    L190 200
    Q185 162 220 160 Z
  " stroke="#000" stroke-width="18" fill="none" stroke-linejoin="round"/>

  <!-- Screen area on device -->
  <path d="
    M280 220
    L650 190
    Q668 189 670 207
    L680 430
    Q682 448 664 450
    L290 475
    Q272 477 270 459
    L265 238
    Q263 220 280 220 Z
  " stroke="#000" stroke-width="12" fill="none" stroke-linejoin="round"/>

  <!-- Code brackets on screen -->
  <path d="M410 310 L380 340 L410 370" stroke="#000" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M530 300 L560 330 L530 360" stroke="#000" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="445" y1="375" x2="500" y2="295" stroke="#000" stroke-width="10" stroke-linecap="round"/>

  <!-- Button row 1 -->
  <rect x="290" y="530" width="80" height="60" rx="14" stroke="#000" stroke-width="12" fill="none"/>
  <rect x="410" y="520" width="80" height="60" rx="14" stroke="#000" stroke-width="12" fill="none"/>
  <rect x="530" y="510" width="80" height="60" rx="14" stroke="#000" stroke-width="12" fill="none"/>

  <!-- Button row 2 -->
  <rect x="300" y="640" width="80" height="60" rx="14" stroke="#000" stroke-width="12" fill="none"/>
  <rect x="420" y="630" width="80" height="60" rx="14" stroke="#000" stroke-width="12" fill="none"/>
  <rect x="540" y="620" width="80" height="60" rx="14" stroke="#000" stroke-width="12" fill="none"/>

  <!-- Power LED dot at bottom -->
  <circle cx="490" cy="770" r="14" stroke="#000" stroke-width="10" fill="none"/>
  <circle cx="490" cy="770" r="5" fill="#000"/>

  <!-- WiFi signal arcs above device -->
  <path d="M440 120 Q480 80 520 120" stroke="#000" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M420 90 Q480 40 540 90" stroke="#000" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
