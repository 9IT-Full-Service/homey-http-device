<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- App Icon: Globe with outgoing HTTP request arrows -->
  <!-- Transparent background, single color (#000), visible against brandColor #00d4ff -->

  <!-- Globe circle -->
  <circle cx="64" cy="64" r="34" stroke="#000" stroke-width="4" fill="none"/>

  <!-- Globe horizontal lines -->
  <path d="M30 64 h68" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <path d="M36 48 h56" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 80 h56" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Globe vertical ellipse (meridian) -->
  <ellipse cx="64" cy="64" rx="16" ry="34" stroke="#000" stroke-width="3" fill="none"/>

  <!-- Outgoing arrow top-right (HTTP request out) -->
  <line x1="88" y1="40" x2="112" y2="20" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  <polyline points="103,18 113,19 112,29" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Incoming arrow bottom-right (HTTP response back) -->
  <line x1="112" y1="108" x2="88" y2="88" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  <polyline points="90,97 87,87 97,88" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
