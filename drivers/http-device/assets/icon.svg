<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Smart device body (rounded rectangle like a smart plug/switch) -->
  <rect x="34" y="22" width="60" height="52" rx="10" fill="#232946" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>

  <!-- Device screen area -->
  <rect x="42" y="30" width="44" height="28" rx="4" fill="#0d1b2a"/>

  <!-- Screen content: < / > code brackets -->
  <text x="64" y="50" text-anchor="middle" font-family="monospace" font-weight="700" font-size="16" fill="#00d4ff" opacity="0.8">&lt;/&gt;</text>

  <!-- Device power indicator dot -->
  <circle cx="64" cy="66" r="2.5" fill="#00ff88" opacity="0.9"/>

  <!-- WiFi / signal arcs above device -->
  <path d="M56 20 Q64 12 72 20" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M52 16 Q64 6 76 16" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Connection lines from device going outward (HTTP requests) -->
  <!-- Right arrow -->
  <line x1="96" y1="48" x2="112" y2="48" stroke="#7b2ff7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M109 44 L114 48 L109 52" fill="none" stroke="#7b2ff7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Left arrow -->
  <line x1="32" y1="48" x2="16" y2="48" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M19 44 L14 48 L19 52" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Data dots flying along connections -->
  <circle cx="104" cy="48" r="2" fill="#7b2ff7" opacity="0.8"/>
  <circle cx="22" cy="48" r="2" fill="#00d4ff" opacity="0.8"/>

  <!-- HTTP label bar at bottom -->
  <rect x="32" y="86" width="64" height="24" rx="12" fill="url(#accent)" opacity="0.15"/>
  <rect x="32" y="86" width="64" height="24" rx="12" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
  <text x="64" y="103" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="15" fill="#00d4ff" letter-spacing="4">HTTP</text>
</svg>
